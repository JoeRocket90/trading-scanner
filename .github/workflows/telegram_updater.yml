name: 🔄 Telegram Command Bot

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-telegram:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pakete installieren
        run: pip install requests anthropic yfinance pandas beautifulsoup4 lxml --quiet

      - name: Prüfe Telegram auf Befehle
        id: check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LAST_UPDATE_ID: ${{ vars.LAST_UPDATE_ID }}
        run: |
          python3 << 'PYEOF'
          import os, requests, re

          token   = os.environ["TELEGRAM_BOT_TOKEN"]
          chat_id = os.environ["TELEGRAM_CHAT_ID"]
          last_id = int(os.environ.get("LAST_UPDATE_ID", "0") or "0")

          url  = f"https://api.telegram.org/bot{token}/getUpdates"
          resp = requests.get(url, params={"offset": last_id + 1, "timeout": 5})
          data = resp.json()

          if not data.get("ok") or not data.get("result"):
              print("Keine neuen Nachrichten")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("command=none\nnew_last_id=0\n")
              import sys; sys.exit(0)

          command     = "none"
          gist_url    = None
          new_last_id = last_id

          for update in data["result"]:
              uid  = update["update_id"]
              new_last_id = max(new_last_id, uid)
              msg  = update.get("message", {})
              text = msg.get("text", "").strip()
              cid  = str(msg.get("chat", {}).get("id", ""))

              if cid != chat_id:
                  continue

              tl = text.lower()

              m = re.search(r"/update\s+(https?://\S+)", text)
              if m:
                  command  = "update"
                  gist_url = m.group(1)
                  print(f"Update-Befehl: {gist_url}")
                  break
              elif "scan" in tl and "megatrend" in tl:
                  command = "scan_megatrend"
                  print("Scan-Befehl: MEGATREND")
                  break
              elif "scan" in tl and "global" in tl:
                  command = "scan_global"
                  print("Scan-Befehl: GLOBAL")
                  break
              elif text in ["/help", "/status", "/hilfe"]:
                  command = "help"
                  break

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"command={command}\n")
              f.write(f"new_last_id={new_last_id}\n")
              if gist_url:
                  f.write(f"gist_url={gist_url}\n")
          PYEOF

      # ── UPDATE ───────────────────────────────────────────────────────────────
      - name: Code-Update verarbeiten
        if: steps.check.outputs.command == 'update'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GIST_URL: ${{ steps.check.outputs.gist_url }}
        run: |
          python3 << 'PYEOF'
          import os, requests, ast

          token    = os.environ["TELEGRAM_BOT_TOKEN"]
          chat_id  = os.environ["TELEGRAM_CHAT_ID"]
          gist_url = os.environ["GIST_URL"]

          def tg(text):
              requests.post(f"https://api.telegram.org/bot{token}/sendMessage",
                  json={"chat_id": chat_id, "text": text, "parse_mode": "HTML"})

          tg("🔄 <b>Update erkannt!</b>\nLade neuen Scanner-Code...")

          raw_url = gist_url
          if "gist.github.com" in gist_url and "/raw/" not in gist_url:
              parts = gist_url.rstrip("/").split("/")
              if len(parts) >= 2:
                  raw_url = f"https://gist.githubusercontent.com/{parts[-2]}/{parts[-1]}/raw/scanner.py"

          resp = requests.get(raw_url, timeout=30)
          if resp.status_code != 200:
              tg(f"❌ Laden fehlgeschlagen: HTTP {resp.status_code}"); exit(1)

          code = resp.text
          try:
              ast.parse(code)
          except SyntaxError as e:
              tg(f"❌ Syntax-Fehler:\n{e}\nAbgebrochen."); exit(1)

          with open("scripts/scanner.py", "w") as f:
              f.write(code)

          tg(f"✅ Code geladen ({code.count(chr(10))} Zeilen) — committe...")
          PYEOF

      - name: Commit und Push
        if: steps.check.outputs.command == 'update'
        run: |
          git config user.name "Trading Bot"
          git config user.email "bot@trading-scanner.auto"
          git add scripts/scanner.py
          git diff --staged --quiet && echo "Keine Änderungen" || git commit -m "🤖 Auto-Update $(date '+%d.%m.%Y %H:%M')"
          git push

      - name: Update Bestätigung
        if: steps.check.outputs.command == 'update'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 -c "
          import os, requests
          requests.post(f\"https://api.telegram.org/bot{os.environ['TELEGRAM_BOT_TOKEN']}/sendMessage\",
              json={'chat_id': os.environ['TELEGRAM_CHAT_ID'],
                    'text': '🚀 <b>Scanner aktualisiert!</b>\nNeuer Code ist live.', 'parse_mode': 'HTML'})"

      # ── SCAN MEGATREND ───────────────────────────────────────────────────────
      - name: Scan Megatrend
        if: steps.check.outputs.command == 'scan_megatrend'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SCAN_MODE: "megatrend"
        run: |
          python3 -c "
          import os, requests
          requests.post(f\"https://api.telegram.org/bot{os.environ['TELEGRAM_BOT_TOKEN']}/sendMessage\",
              json={'chat_id': os.environ['TELEGRAM_CHAT_ID'],
                    'text': '🔍 <b>Megatrend-Scan gestartet...</b>\nScanne alle 9 Sektoren.', 'parse_mode': 'HTML'})"
          SCAN_MODE=megatrend python scripts/scanner.py

      # ── SCAN GLOBAL ──────────────────────────────────────────────────────────
      - name: Scan Global
        if: steps.check.outputs.command == 'scan_global'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SCAN_MODE: "global"
        run: |
          python3 -c "
          import os, requests
          requests.post(f\"https://api.telegram.org/bot{os.environ['TELEGRAM_BOT_TOKEN']}/sendMessage\",
              json={'chat_id': os.environ['TELEGRAM_CHAT_ID'],
                    'text': '🌍 <b>Global-Scan gestartet...</b>\nS&P500 + Finviz + alle Sektoren.\n~5 Minuten.', 'parse_mode': 'HTML'})"
          SCAN_MODE=global python scripts/scanner.py

      # ── HELP ─────────────────────────────────────────────────────────────────
      - name: Hilfe senden
        if: steps.check.outputs.command == 'help'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 -c "
          import os, requests
          requests.post(f\"https://api.telegram.org/bot{os.environ['TELEGRAM_BOT_TOKEN']}/sendMessage\",
              json={'chat_id': os.environ['TELEGRAM_CHAT_ID'],
                    'text': '📋 <b>Befehle:</b>\n\n🔍 <b>Scan - Megatrend</b>\n→ 9 Megatrend-Sektoren scannen\n\n🌍 <b>Scan - Global</b>\n→ S&P500 + Finviz + Megatrends\n\n🔄 <b>/update URL</b>\n→ Scanner updaten\n\n/help → Diese Hilfe',
                    'parse_mode': 'HTML'})"

      # ── UPDATE-ID ─────────────────────────────────────────────────────────────
      - name: Update-ID speichern
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_ID: ${{ steps.check.outputs.new_last_id }}
          REPO: ${{ github.repository }}
        run: |
          if [ -n "$NEW_ID" ] && [ "$NEW_ID" != "0" ]; then
            gh variable set LAST_UPDATE_ID --body "$NEW_ID" --repo "$REPO" || true
            echo "Update-ID gespeichert: $NEW_ID"
          fi
