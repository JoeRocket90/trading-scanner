name: 📈 Trading Signal Scanner

on:
  schedule:
    - cron: "0 7 * * 1-5"     # 09:00 MEZ — Morgen-Bericht
    - cron: "0 9 * * 1-5"     # 11:00 MEZ — Intraday
    - cron: "0 11 * * 1-5"    # 13:00 MEZ — Intraday
    - cron: "0 13 * * 1-5"    # 15:00 MEZ — Intraday
    - cron: "30 14 * * 1-5"   # 16:30 MEZ — Nachmittag / US-Open
    - cron: "0 17 * * 1-5"    # 19:00 MEZ — US-Mitte
    - cron: "0 18 * * 1-5"    # 20:00 MEZ — Intraday
    - cron: "0 19 * * 1-5"    # 21:00 MEZ — Intraday
    - cron: "0 20 * * 1-5"    # 22:00 MEZ — US-Schluss
    - cron: "0 21 * * 1-5"    # 23:00 MEZ — After-Hours
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install anthropic yfinance pandas requests --quiet
      - name: Signal-Scan ausführen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/scanner.py
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-log-${{ github.run_number }}
          path: sent_signals.json
          retention-days: 7
