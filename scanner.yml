name: 📈 Trading Signal Scanner

on:
  schedule:
    - cron: "0 7 * * 1-5"
    - cron: "0 9 * * 1-5"
    - cron: "0 11 * * 1-5"
    - cron: "0 13 * * 1-5"
    - cron: "30 14 * * 1-5"
    - cron: "0 18 * * 1-5"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install anthropic yfinance pandas requests --quiet
      - name: Signal-Scan ausführen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/scanner.py
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-log-${{ github.run_number }}
          path: sent_signals.json
          retention-days: 7
